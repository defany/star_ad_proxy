root = "."
tmp_dir = "tmp"

[build]
bin = "./tmp/star_ad_proxy"
cmd = "go build -o ./tmp/star_ad_proxy ./cmd/app"
delay = 300
exclude_dir = ["tmp", ".git", "vendor", "testdata"]
exclude_regex = ["_test.go"]
include_ext = ["go"]
include_file = [
    ".env",
    "config/local.json",
]
log = "tmp/air-build-errors.log"
stop_on_error = true

send_interrupt = true
kill_delay = "2s"

[log]
time = true

[misc]
clean_on_exit = true

[screen]
clear_on_rebuild = true
keep_scroll = true
