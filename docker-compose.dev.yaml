services:
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.31.2
    ports:
      - "6379:6379"
    volumes:
      - dragonfly-data:/data
    command:
      - "--dir=/data"
      - "--dbfilename=dump"
      - "--snapshot_cron=0 */3 * * *"
    restart: unless-stopped

volumes:
  dragonfly-data:
